[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pyfinquant"
version = "0.1.0"
description = "A Python package for financial modeling, option pricing, and quantitative analysis."
authors = [
  { name = "Puneeth G B", email = "your-email@example.com" }
]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "numpy",
  "scipy",
  "pandas",
  "plotly",
]

[project.optional-dependencies]
dev = [
  "ruff",
  "mypy",
  "pytest",
  "pytest-cov",
  "black",
  "isort",
  "build",
]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "--strict-markers"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.9"
strict = true
ignore_missing_imports = true
pretty = true

[tool.ruff]
target-version = "py39"
line-length = 100
fix = true
show-fixes = true
extend-exclude = ["build", "dist", ".venv", "__pycache__"]

[tool.black]
line-length = 100
target-version = ['py39']

[tool.isort]
profile = "black"
line_length = 100